<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Many Faces</title>
    <style>
      .global-app-preloader-vanilla{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;min-height:100dvh;background:#f8fafc;margin:0;padding:0;overflow:hidden;box-sizing:border-box}
      .global-app-preloader-vanilla__stack{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
      .global-app-preloader-vanilla__logo{width:136px;height:136px;display:block;flex-shrink:0;object-fit:contain}
      .global-app-preloader-vanilla__dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:36px;min-height:48px;height:48px;flex-shrink:0}
      .global-app-preloader-vanilla__dot{width:12px;height:12px;border-radius:50%;background:#475569;flex-shrink:0;transform-origin:center center;animation:global-preloader-bounce .9s infinite ease-in-out both}
      .global-app-preloader-vanilla__dot:nth-child(2){animation-delay:.15s}
      .global-app-preloader-vanilla__dot:nth-child(3){animation-delay:.3s}
      @keyframes global-preloader-bounce{0%,80%,100%{transform:scale(.75);opacity:.55}40%{transform:scale(1);opacity:1}}
      @media (prefers-reduced-motion:reduce){.global-app-preloader-vanilla__dots{visibility:hidden}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="global-app-preloader-vanilla" role="status" aria-busy="true" aria-label="Loading application">
        <div class="global-app-preloader-vanilla__stack">
          <img class="global-app-preloader-vanilla__logo" src="/favicon-32x32.png" width="136" height="136" alt="" />
          <div class="global-app-preloader-vanilla__dots" aria-hidden="true">
            <span class="global-app-preloader-vanilla__dot"></span>
            <span class="global-app-preloader-vanilla__dot"></span>
            <span class="global-app-preloader-vanilla__dot"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
