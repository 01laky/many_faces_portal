<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Many Faces</title>
    <style>
      @font-face{font-family:'Sweetest Cat Ever';src:url('/fonts/sweetest-cat-ever.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
      .app-brand-font{font-family:'Sweetest Cat Ever','Segoe Script','Brush Script MT',cursive;font-weight:400;font-style:normal}
      .global-app-preloader-vanilla{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;min-height:100dvh;background:#f8fafc;margin:0;padding:0;overflow:hidden;box-sizing:border-box}
      .global-app-preloader-vanilla__stack{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
      .global-app-preloader-vanilla__logo{width:408px;height:408px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .global-app-preloader-vanilla__logo .main-logo{width:408px;height:408px;flex-shrink:0}
      .global-app-preloader-vanilla__logo .main-logo img{width:100%;height:100%;display:block;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15))}
      .global-app-preloader-vanilla__title{margin:12px 0 0;padding:0;font-size:56px;line-height:1.05;color:#1e293b;text-align:center;flex-shrink:0;white-space:nowrap;letter-spacing:.02em}
      .global-app-preloader-vanilla__dots{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:36px;min-height:144px;height:144px;flex-shrink:0}
      .global-app-preloader-vanilla__dot{width:36px;height:36px;border-radius:50%;background:#475569;flex-shrink:0;transform-origin:center center;animation:global-preloader-bounce .9s infinite ease-in-out both}
      .global-app-preloader-vanilla__dot:nth-child(2){animation-delay:.15s}
      .global-app-preloader-vanilla__dot:nth-child(3){animation-delay:.3s}
      @keyframes global-preloader-bounce{0%,80%,100%{transform:scale(.75);opacity:.55}40%{transform:scale(1);opacity:1}}
      @media (max-width:767px){.global-app-preloader-vanilla__logo{width:306px;height:306px}.global-app-preloader-vanilla__logo .main-logo{width:306px;height:306px}.global-app-preloader-vanilla__title{margin-top:9px;font-size:42px}.global-app-preloader-vanilla__dots{gap:18px;margin-top:27px;min-height:108px;height:108px}.global-app-preloader-vanilla__dot{width:27px;height:27px}}
      @media (prefers-reduced-motion:reduce){.global-app-preloader-vanilla__dots{visibility:hidden}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="global-app-preloader-vanilla" role="status" aria-busy="true" aria-label="Loading application">
        <div class="global-app-preloader-vanilla__stack">
          <div class="global-app-preloader-vanilla__logo">
            <div class="main-logo">
              <img src="/logo-raster-source.png" alt="" />
            </div>
          </div>
          <p class="global-app-preloader-vanilla__title app-brand-font">Many Faces</p>
          <div class="global-app-preloader-vanilla__dots" aria-hidden="true">
            <span class="global-app-preloader-vanilla__dot"></span>
            <span class="global-app-preloader-vanilla__dot"></span>
            <span class="global-app-preloader-vanilla__dot"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
